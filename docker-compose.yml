services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8030:8030"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 8.8.4.4
    volumes:
      - ./data:/app/data               # SQLite database
      - ./output:/app/output            # Generated outputs
      - ./uploads:/app/uploads          # User uploads
      - ./settings.json:/app/settings.json  # API key settings

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8030
    ports:
      - "3030:3030"
    depends_on:
      - backend
